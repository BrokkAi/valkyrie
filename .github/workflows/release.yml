name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }} release artifact
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vk-linux-x86_64
            binary_path: target/x86_64-unknown-linux-gnu/release/vk
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vk-macos-aarch64
            binary_path: target/aarch64-apple-darwin/release/vk
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vk-windows-x86_64.exe
            binary_path: target/x86_64-pc-windows-msvc/release/vk.exe
          - os: ubuntu-latest
            target: aarch64-linux-android
            artifact_name: vk-android-aarch64
            binary_path: target/aarch64-linux-android/release/vk
            android: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        if: matrix.android == true
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Export Android NDK toolchain
        if: matrix.android == true
        shell: bash
        run: |
          ndk_path='${{ steps.setup-ndk.outputs.ndk-path }}'
          echo "ANDROID_NDK_HOME=$ndk_path" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_path" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Copy artifact
        shell: bash
        run: cp "${{ matrix.binary_path }}" "${{ matrix.artifact_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

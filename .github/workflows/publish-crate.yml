name: Publish crate

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to crates.io instead of running a dry-run
        required: false
        default: false
        type: boolean

jobs:
  publish:
    name: Publish brokk-valkryie to crates.io
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: read
      id-token: write

    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-
            ${{ runner.os }}-cargo-

      - name: Verify tag matches Cargo.toml version
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED_VERSION="${TAG#v}"
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          if [ "$EXPECTED_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($EXPECTED_VERSION) does not match Cargo.toml version ($CARGO_VERSION). Bump Cargo.toml before tagging."
            exit 1
          fi
          echo "Tag and Cargo.toml versions match: $CARGO_VERSION"

      - name: Verify package
        run: cargo publish --dry-run -p brokk-valkryie --locked

      - name: Authenticate with crates.io trusted publishing
        if: env.CARGO_REGISTRY_TOKEN == '' && (github.event_name == 'push' || github.event.inputs.publish == 'true')
        id: trusted_publishing
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish crate with token secret
        if: env.CARGO_REGISTRY_TOKEN != '' && (github.event_name == 'push' || github.event.inputs.publish == 'true')
        run: cargo publish -p brokk-valkryie --locked

      - name: Publish crate with trusted publishing
        if: env.CARGO_REGISTRY_TOKEN == '' && steps.trusted_publishing.outcome == 'success' && (github.event_name == 'push' || github.event.inputs.publish == 'true')
        run: cargo publish -p brokk-valkryie --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.trusted_publishing.outputs.token }}

      - name: Report missing crates.io publishing credentials
        if: env.CARGO_REGISTRY_TOKEN == '' && steps.trusted_publishing.outcome != 'success' && (github.event_name == 'push' || github.event.inputs.publish == 'true')
        run: |
          echo "::warning::Crate publish skipped because neither repository secret CARGO_REGISTRY_TOKEN nor crates.io Trusted Publishing is configured."
          echo "Configure crates.io Trusted Publishing for BrokkAi/valkyrie or add a repository secret named CARGO_REGISTRY_TOKEN, then rerun this workflow with publish=true."
